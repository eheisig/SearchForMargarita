<title>SUV Shortlist</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #f7f4ee;
    color: #1a1a1a;
    max-width: 1300px;
    margin: 0 auto;
    padding: 56px 40px 96px;
  }

  /* WCAG 2.4.11 Focus Appearance — 3px outline, 3:1+ contrast */
  :focus-visible {
    outline: 3px solid #1a5c2a;
    outline-offset: 3px;
    border-radius: 1px;
  }

  header { margin-bottom: 72px; }
  header h1 {
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    font-weight: 800;
    letter-spacing: -0.04em;
    line-height: 1;
  }
  header p {
    font-size: 0.75rem;
    color: #4a4035;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .section-header {
    margin: 0 0 40px;
    padding-bottom: 16px;
    border-bottom: 2px solid #1a1a1a;
  }
  .section-header h2 {
    font-size: clamp(1.2rem, 3vw, 1.8rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .section-header p {
    font-size: 0.75rem;
    color: #4a4035;
    margin-top: 8px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .source-section { margin-bottom: 80px; }

  /* Two-column on desktop, single on mobile */
  .list {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0;
  }
  @media (min-width: 800px) {
    .list {
      grid-template-columns: 1fr 1fr;
      column-gap: 72px;
    }
  }

  .car {
    display: grid;
    grid-template-columns: 44px 1fr;
    column-gap: 20px;
    padding-bottom: 64px;
  }

  .num {
    font-size: 0.65rem;
    color: #6a5e4e;
    font-variant-numeric: tabular-nums;
    padding-top: 6px;
    text-align: right;
    letter-spacing: 0.02em;
  }
  .car.local .num { color: #1a5c2a; font-weight: 700; }

  .body { display: flex; flex-direction: column; gap: 6px; }

  .name {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1.2;
  }
  .name .trim {
    font-weight: 400;
    color: #4a4035;
    font-size: 1rem;
  }

  .price-row { display: flex; align-items: baseline; gap: 14px; margin-top: 2px; }
  .price { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
  .miles { font-size: 0.8rem; color: #4a4035; }

  .meta, .loc, .safety, .owners, .feats, .badges-row {
    font-size: 0.78rem;
    color: #4a4035;
  }

  .local-tag { color: #1a5c2a; font-weight: 700; text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.08em; }
  .ship-tag  { color: #4a4035; text-transform: uppercase; font-size: 0.68rem; letter-spacing: 0.08em; }

  .stars    { color: #7a5500; }
  .tsp-plus { color: #1a5c2a; font-weight: 700; }
  .tsp      { color: #2a4a8c; font-weight: 600; }

  .accident    { color: #9b1a1a; font-weight: 600; }
  .no-accident { color: #1a5c2a; }

  /* WCAG 2.5.8 Target Size */
  .link {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    margin-top: 10px;
    padding: 4px 0;
    font-size: 0.82rem;
    font-weight: 700;
    color: #1a1a1a;
    text-decoration: none;
    border-bottom: 1px solid #1a1a1a;
    letter-spacing: 0.01em;
  }
  .link:hover { color: #1a5c2a; border-color: #1a5c2a; }

  /* ── Toggle switch (CarMax local-only) ──────────────────────────────────── */
  .toggle-wrap {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-top: 10px;
    font-size: 0.78rem;
    color: #4a4035;
    letter-spacing: 0.02em;
    cursor: pointer;
    user-select: none;
  }
  .toggle-wrap input[type="checkbox"] {
    appearance: none;
    -webkit-appearance: none;
    width: 36px;
    height: 20px;
    border: 2px solid #4a4035;
    border-radius: 10px;
    background: #f7f4ee;
    cursor: pointer;
    position: relative;
    transition: background 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .toggle-wrap input[type="checkbox"]::after {
    content: '';
    position: absolute;
    top: 2px;
    left: 2px;
    width: 12px;
    height: 12px;
    background: #4a4035;
    border-radius: 50%;
    transition: transform 0.15s, background 0.15s;
  }
  .toggle-wrap input[type="checkbox"]:checked {
    background: #1a5c2a;
    border-color: #1a5c2a;
  }
  .toggle-wrap input[type="checkbox"]:checked::after {
    transform: translateX(16px);
    background: #f7f4ee;
  }
  .toggle-wrap input[type="checkbox"]:focus-visible {
    outline: 3px solid #1a5c2a;
    outline-offset: 3px;
  }
</style>
</head>

// ── Shared helpers ────────────────────────────────────────────────────────────
function stars(n) {
  return `<span class="stars" aria-label="${n} out of 5 stars">${'★'.repeat(n)}${'☆'.repeat(5-n)}</span>`;
}

function iihs(award) {
  return `<span class="${award === 'TSP+' ? 'tsp-plus' : 'tsp'}">${award}</span>`;
}

// ── CarMax render ─────────────────────────────────────────────────────────────
function renderCarMax(c, i) {
  const isLocal = c.shipping === 'Local';
  const feats = [c.sunroof && 'Sunroof', c.bsm && 'Blind Spot Monitor', c.lda && 'Lane Departure Alert', c.acc && 'Adaptive Cruise'].filter(Boolean);
  const accClass = c.accident === 'None reported' ? 'no-accident' : 'accident';
  const accText  = c.accident === 'None reported' ? 'No accidents' : c.accident;
  const locTag   = isLocal ? `<span class="local-tag">Local</span>` : `<span class="ship-tag">Ships free</span>`;
  return `
  <article class="car${isLocal ? ' local' : ''}" aria-label="${c.year} ${c.make} ${c.model} ${c.trim}">
    <div class="num" aria-hidden="true">${String(i+1).padStart(2,'0')}</div>
    <div class="body">
      <h3 class="name">${c.year} ${c.make} ${c.model} <span class="trim">${c.trim}</span></h3>
      <div class="price-row">
        <span class="price">$${c.price.toLocaleString()}</span>
        <span class="miles">${c.miles.toLocaleString()} mi</span>
      </div>
      <div class="meta">${c.cityMpg} mpg city · ${c.cargo} cu ft cargo</div>
      <div class="loc">${c.location} · ${locTag}</div>
      <div class="safety">${stars(parseInt(c.nhtsa))} ${iihs(c.iihs)}</div>
      <div class="owners">${c.owners} owner${c.owners !== 1 ? 's' : ''} · <span class="${accClass}">${accText}</span></div>
      ${feats.length ? `<div class="feats">${feats.join(' · ')}</div>` : ''}
      <a class="link" href="${c.url}" target="_blank" rel="noopener" aria-label="${c.year} ${c.make} ${c.model} ${c.trim} on CarMax">View on CarMax →</a>
    </div>
  </article>`;
}

// ── CarFax render ─────────────────────────────────────────────────────────────
function parseMilesLoc(ml) {
  if (!ml) return {miles: '', location: ''};
  const pipe = ml.indexOf(' | ');
  return {
    miles: pipe > 0 ? ml.slice(0, ml.indexOf(' miles')) : '',
    location: pipe > 0 ? ml.slice(pipe + 3).trim() : ''
  };
}

function accidentFromBadges(badges) {
  if (!badges || badges.includes('No Accident or Damage')) return null;
  if (/Accident|Damage/i.test(badges)) return badges.split(' | ')[0];
  return null;
}

function renderCarFax(c, i) {
  const {miles, location} = parseMilesLoc(c.miles_loc);
  const isNearby = c.dist_mi <= 50 && c.dist_mi !== 999;
  const isLocal  = c.dist_mi <= 20;
  const accident = accidentFromBadges(c.badges);
  const accClass = accident ? 'accident' : 'no-accident';
  const accText  = accident ? accident : 'No accidents';
  const distText = c.dist_mi === 999 ? '' : ` · ${c.dist_mi} mi away`;
  const cargoText = c.cargo_note ? `${c.cargo_cuft} cu ft (${c.cargo_note})` : `${c.cargo_cuft} cu ft cargo`;
  const trimPart = c.trim ? ` <span class="trim">${c.trim}</span>` : '';

  return `
  <article class="car${isLocal ? ' local' : ''}" aria-label="${c.year} ${c.make} ${c.model}${c.trim ? ' ' + c.trim : ''}">
    <div class="num" aria-hidden="true">${String(i+1).padStart(2,'0')}</div>
    <div class="body">
      <h3 class="name">${c.year} ${c.make} ${c.model}${trimPart}</h3>
      <div class="price-row">
        <span class="price">$${c.price.toLocaleString()}</span>
        ${miles ? `<span class="miles">${miles} mi</span>` : ''}
      </div>
      <div class="meta">${c.city_mpg} mpg city · ${cargoText}</div>
      ${location ? `<div class="loc">${location}${distText}${isLocal ? ' · <span class="local-tag">Local</span>' : ''}</div>` : ''}
      <div class="safety">${stars(c.nhtsa_stars)} ${iihs(c.iihs_award)}</div>
      <div class="owners"><span class="${accClass}">${accText}</span></div>
      ${c.badges ? `<div class="badges-row">${c.badges.split(' | ').slice(1).join(' · ')}</div>` : ''}
      <a class="link" href="${c.url}" target="_blank" rel="noopener" aria-label="${c.year} ${c.make} ${c.model} on CarFax">View on CarFax →</a>
    </div>
  </article>`;
}

function renderCarMaxList(filterLocal) {
  const cars = filterLocal ? CARMAX.filter(c => c.shipping === 'Local') : CARMAX;
  document.getElementById('carmax-list').innerHTML = cars.map(renderCarMax).join('');
  document.getElementById('carmax-count').textContent =
    `${cars.length} car${cars.length !== 1 ? 's' : ''} · ${filterLocal ? 'Local only' : 'Charlottesville area'}`;
}

renderCarMaxList(false);
document.getElementById('carfax-list').innerHTML = CARFAX.map(renderCarFax).join('');

document.getElementById('carmax-toggle').addEventListener('change', function () {
  renderCarMaxList(this.checked);
});
</script>
